[build]
command = "npm run build"
publish = "dist"

# Serve the animal-advocacy page at its dedicated custom subdomain while
# preserving the rest of the shared site's assets and routes.
[[redirects]]
from = "https://animals.chrisbrennan.net/"
to = "/animals/index.html"
status = 200
force = true

[[redirects]]
from = "/animals"
to = "/animals/"
status = 301

[[redirects]]
from = "/animals/*"
to = "/animals/index.html"
status = 200

[[redirects]]
from = "/bodybuilding"
to = "/bodybuilding/"
status = 301

[[redirects]]
from = "/bodybuilding/*"
to = "/bodybuilding/index.html"
status = 200

[[redirects]]
from = "/esports"
to = "/esports/"
status = 301

[[redirects]]
from = "/esports/*"
to = "/esports/index.html"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
